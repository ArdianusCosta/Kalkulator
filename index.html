<!DOCTYPE html>
<html lang="en">
<head>

        <button class="btn" onclick="hitungSasax('8')">8</button>

        <button class="btn" onclick="hitungSasax('4')">4</button>

        <button class="btn" onclick="hitungSasax('-')">-</button>
        <br>
        <button class="btn" onclick="clearKang('C')">C</button>
        <button class="btn" onclick="hitungSasax('0')">0</button>
        <button class="btn" onclick="hitungSasax('+')">+</button>
